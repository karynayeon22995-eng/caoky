  <!-- Structured Data -->

<body>

  <!-- Preloader -->

    <div class="preloader-logo">K</div>
  </div>

  <!-- Skip Navigation (Accessibility) -->
  <a href="#hero" class="skip-nav">Skip to main content</a>

  <!-- Page Transition Overlay -->

  <!-- HERO SECTION — BRAIN HUB -->
  <section class="hero hero-chaos" id="hero">
    <div class="hero-orb orb-1" aria-hidden="true"></div>
    <div class="hero-orb orb-2" aria-hidden="true"></div>
    <div class="hero-orb orb-3" aria-hidden="true"></div>
    <div class="hero-orb orb-4" aria-hidden="true"></div>

    <!-- SVG Lines -->
    <svg class="brain-lines" id="brainLines" aria-hidden="true">
      <defs>
        <linearGradient id="lineGradL" x1="0%" y1="50%" x2="100%" y2="50%">
          <stop offset="0%" stop-color="#0055ff" stop-opacity="0.2" />
          <stop offset="100%" stop-color="#60a5fa" />
        </linearGradient>
        <linearGradient id="lineGradR" x1="100%" y1="50%" x2="0%" y2="50%">
          <stop offset="0%" stop-color="#0055ff" stop-opacity="0.2" />
          <stop offset="100%" stop-color="#60a5fa" />
        </linearGradient>
        <filter id="lineGlow">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
    </svg>

    <!-- Left: AI Logos -->
    <div class="brain-side brain-left" id="brainLeft">
      <div class="brain-logo" data-side="left"><img src="logos/chatgpt.webp" alt="" class="cl-img" /></div>

      <div class="brain-logo" data-side="left"><img src="logos/stable.webp" alt="" class="cl-img" /></div>
      <div class="brain-logo" data-side="left"><img src="logos/elevenlabs.webp" alt="" class="cl-img" /></div>

    </div>

    <!-- Center: Brain Hub -->

      <div class="brain-circle" id="brainCircle">
        <div class="brain-glow"></div>
        <img src="logos/brain.webp" alt="Brain" class="brain-icon-img" />
